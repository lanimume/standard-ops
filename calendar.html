        .calendar-day { aspect-ratio: 1; cursor: pointer; transition: all 0.2s; }
        .calendar-day:hover:not(.empty) { background-color: #ecfdf5; transform: scale(1.1); border-radius: 8px; }
        .calendar-day.today { background-color: #10b981; color: white; border-radius: 8px; }
        .step-photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .step-photo-preview .photo-item { position: relative; width: 80px; height: 80px; }
        .step-photo-preview .photo-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; }
        .step-photo-preview .photo-item img:hover { opacity: 0.8; }
        .step-photo-preview .photo-item .delete-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; opacity: 0; transition: opacity 0.2s; z-index: 10; }
        .step-photo-preview .photo-item:hover .delete-btn { opacity: 1; }
        .step-photo-preview .photo-item .img-error { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f3f4f6; border-radius: 8px; font-size: 12px; color: #9ca3af; }
        .photo-upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px dashed #d1d5db; border-radius: 8px; cursor: pointer; color: #6b7280; font-size: 13px; transition: all 0.2s; margin-top: 8px; }
        .photo-upload-btn:hover { border-color: #10b981; color: #10b981; background: #ecfdf5; }
        .task-card { transition: all 0.3s; }
        .task-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>

<script src="supabase.js"></script>
<script>
let currentDate = new Date();
let selectedDate = new Date().toISOString().split('T')[0];
let taskData = [];
let monthTaskData = []; // 整月任务数据（用于日历小红点）
let currentTaskId = null;
let deletingTaskId = null;

document.addEventListener('DOMContentLoaded', async () => {
    updateTime();
    setInterval(updateTime, 1000);

    // 权限检查
    const authorized = await authGuard.init();
    if (!authorized) return;

    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        } else if (typeof supabase !== 'undefined') {
            window.supabase = supabase;
        }
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        document.getElementById('system-status').textContent = '离线模式';
        document.getElementById('status-dot').classList.remove('bg-white', 'animate-pulse');
        document.getElementById('status-dot').classList.add('bg-red-400');
        document.getElementById('status-text').textContent = '数据库未连接';
    }

    try {
        await generateDailyTasks(selectedDate, false);
        taskData = await loadSopTasks(selectedDate);

        // 普通用户只显示自己的任务
        if (!authGuard.isAdmin()) {
            const myPersonId = authGuard.getCurrentPersonId();
            taskData = taskData.filter(t => t.person_id === myPersonId);
        }

        // 加载整月任务数据用于日历小红点
        monthTaskData = await loadMonthSopTasks(currentDate.getFullYear(), currentDate.getMonth());
        if (!authGuard.isAdmin()) {
            const myPersonId = authGuard.getCurrentPersonId();
            monthTaskData = monthTaskData.filter(t => t.person_id === myPersonId);
        }
    } catch (e) {
        console.error('任务加载失败:', e);
        showToast('警告', '数据库连接失败，任务数据可能不完整', 'warning');
    }

    document.getElementById('loading').classList.add('hidden');
    renderCalendar();
    renderTasks();
});

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('calendar-month-year').textContent = `${year}年 ${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-day empty';
        grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = dateStr === new Date().toISOString().split('T')[0];
        const isSelected = dateStr === selectedDate;
        const hasTask = monthTaskData.some(t => t.date === dateStr);

        const cell = document.createElement('div');
        cell.className = `calendar-day relative flex items-center justify-center text-sm font-medium rounded-lg ${isSelected ? 'ring-2 ring-emerald-500 bg-emerald-50' : isToday ? 'today' : 'text-gray-700 hover:bg-gray-50'}`;
        cell.innerHTML = `${day}${hasTask ? '<span class="absolute top-1 right-1 w-1.5 h-1.5 bg-red-500 rounded-full"></span>' : ''}`;
        cell.onclick = () => selectDate(dateStr);
        grid.appendChild(cell);
    }
}

async function selectDate(dateStr) {
    selectedDate = dateStr;
    document.getElementById('selected-date-title').textContent = dateStr === new Date().toISOString().split('T')[0] ? '今日任务' : `${dateStr} 任务`;
    document.getElementById('selected-date-subtitle').textContent = dateStr;

    try {
        await generateDailyTasks(dateStr, false);
        taskData = await loadSopTasks(dateStr);

        // 普通用户只显示自己的任务
        if (!authGuard.isAdmin()) {
            const myPersonId = authGuard.getCurrentPersonId();
            taskData = taskData.filter(t => t.person_id === myPersonId);
        }

        // 如果切换了月份，重新加载整月数据
        const newDate = new Date(dateStr);
        if (newDate.getFullYear() !== currentDate.getFullYear() || newDate.getMonth() !== currentDate.getMonth()) {
            currentDate = newDate;
            monthTaskData = await loadMonthSopTasks(currentDate.getFullYear(), currentDate.getMonth());
            if (!authGuard.isAdmin()) {
                const myPersonId = authGuard.getCurrentPersonId();
                monthTaskData = monthTaskData.filter(t => t.person_id === myPersonId);
            }
        }
    } catch (e) {
        console.error('任务加载失败:', e);
        showToast('警告', '任务加载失败', 'warning');
    }
    renderCalendar();
    renderTasks();
}

async function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);

    // 加载新月份的整月任务数据
    try {
        monthTaskData = await loadMonthSopTasks(currentDate.getFullYear(), currentDate.getMonth());
        if (!authGuard.isAdmin()) {
            const myPersonId = authGuard.getCurrentPersonId();
            monthTaskData = monthTaskData.filter(t => t.person_id === myPersonId);
        }
    } catch (e) {
        console.error('整月任务加载失败:', e);
    }

    renderCalendar();
}

function renderTasks() {
    const container = document.getElementById('task-list');
    const badge = document.getElementById('task-count-badge');

    const total = taskData.length;
    const completed = taskData.filter(t => t.status === 'completed').length;
    badge.textContent = `${total - completed} 个待办 / ${total} 个任务`;

    if (taskData.length === 0) {
        container.innerHTML = `
            <div class="text-center py-8">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 mx-auto mb-3">
                    <i class="fas fa-clipboard-check text-2xl"></i>
                </div>
                <p class="text-gray-400 text-sm">该日暂无任务</p>
                <p class="text-xs text-gray-400 mt-1">请检查：</p>
                <ul class="text-xs text-gray-400 mt-1 text-left inline-block">
                    <li>1. 排班管理中是否已为该日期安排班次</li>
                    <li>2. 班次是否关联了 SOP 流程模板</li>
                    <li>3. 点击上方"刷新"按钮重新生成任务</li>
                </ul>
            </div>
        `;
        return;
    }

    container.innerHTML = taskData.map(task => {
        const doneSteps = (task.steps || []).filter(s => s.done).length;
        const totalSteps = (task.steps || []).length;
        const progress = totalSteps > 0 ? Math.round(doneSteps / totalSteps * 100) : 0;
        const isCompleted = task.status === 'completed';

        const statusConfig = {
            completed: { label: '已完成', color: 'bg-emerald-100 text-emerald-700', icon: 'fa-check-circle' },
            progress: { label: '进行中', color: 'bg-amber-100 text-amber-700', icon: 'fa-spinner fa-spin' },
            pending: { label: '待开始', color: 'bg-blue-100 text-blue-700', icon: 'fa-clock' }
        };
        const s = statusConfig[task.status];

        return `
            <div class="task-card bg-white rounded-xl p-5 border border-gray-100 ${isCompleted ? 'opacity-70' : ''}">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 ${task.person?.color || 'bg-gray-500'} rounded-xl flex items-center justify-center text-white font-bold text-sm">
                            ${task.person?.avatar || task.person?.name?.charAt(0) || '?'}
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 ${isCompleted ? 'line-through' : ''}">${task.sop_template?.title || '未知任务'}</h4>
                            <p class="text-sm text-gray-500">${task.person?.name || '未分配'} · ${task.sop_template?.category || ''}</p>
                        </div>
                    </div>
                    <span class="inline-block px-2.5 py-1 rounded-lg text-xs font-medium ${s.color}">
                        <i class="fas ${s.icon} mr-1"></i>${s.label}
                    </span>
                </div>

                <div class="mb-3">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-500">完成进度</span>
                        <span class="font-bold ${isCompleted ? 'text-emerald-600' : 'text-gray-800'}">${doneSteps}/${totalSteps} 步骤</span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-500 ${isCompleted ? 'bg-emerald-500' : 'bg-amber-500'}" style="width: ${progress}%"></div>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="openTaskDetail(${task.id})" class="flex-1 py-2 rounded-xl bg-emerald-50 text-emerald-700 text-sm font-medium hover:bg-emerald-100 transition-colors">
                        <i class="fas fa-list-check mr-1"></i> ${selectedDate === new Date().toISOString().split('T')[0] ? '查看详情' : '查看（仅当天可编辑）'}
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

async function loadStepPhotos(taskId, stepIndex) {
    try {
        const { data, error } = await supabase
            .from('task_photos')
            .select('id, photo_url, uploaded_at')
            .eq('task_id', taskId)
            .eq('step_index', stepIndex)
            .order('uploaded_at', { ascending: true });
        if (error) throw error;
        return data || [];
    } catch (e) {
        console.error('loadStepPhotos error:', e);
        return [];
    }
}

async function openTaskDetail(taskId) {
    currentTaskId = taskId;
    const task = taskData.find(t => t.id === taskId);
    if (!task) return;

    const isToday = selectedDate === new Date().toISOString().split('T')[0];

    document.getElementById('task-modal-title').textContent = task.sop_template?.title || '任务详情';
    document.getElementById('task-modal-subtitle').textContent = `${task.person?.name || ''} · ${task.sop_template?.category || ''} · ${selectedDate}${!isToday ? '（仅查看模式）' : ''}`;

    const container = document.getElementById('task-steps-container');
    container.innerHTML = '<p class="text-center text-gray-400 py-4">加载步骤中...</p>';

    const stepPhotosPromises = (task.steps || []).map((_, idx) => loadStepPhotos(taskId, idx));
    const allStepPhotos = await Promise.all(stepPhotosPromises);

    container.innerHTML = (task.steps || []).map((step, idx) => {
        const isDone = step.done;
        const photos = allStepPhotos[idx] || [];
        const hasPhotos = photos.length > 0;

        return `
            <div class="border rounded-xl p-4 ${isDone ? 'border-emerald-200 bg-emerald-50/50' : 'border-gray-200'}" data-step-index="${idx}">
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${isDone ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-500'}">
                        ${isDone ? '<i class="fas fa-check"></i>' : idx + 1}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <h4 class="font-medium text-gray-800 ${isDone ? 'line-through text-gray-400' : ''}">${step.name}</h4>
                            ${isToday && !isDone ? `
                                <button onclick="completeStep(${taskId}, ${idx})" class="px-3 py-1.5 rounded-lg bg-emerald-500 text-white text-xs font-medium hover:bg-emerald-600 transition-colors">
                                    <i class="fas fa-check mr-1"></i>完成
                                </button>
                            ` : `
                                <span class="text-xs ${isDone ? 'text-emerald-600' : 'text-gray-400'} font-medium">
                                    <i class="fas ${isDone ? 'fa-check-circle' : 'fa-lock'} mr-1"></i>${isDone ? '已完成' : '仅当天可编辑'}
                                </span>
                            `}
                        </div>

                        ${isToday && !isDone ? `
                            <div class="mt-2">
                                <textarea id="note-${taskId}-${idx}" rows="2" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none resize-none" placeholder="输入执行备注（可选）">${step.note || ''}</textarea>
                            </div>
                        ` : `
                            <div class="mt-2 flex items-center gap-2">
                                <span class="text-xs text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md font-medium">
                                    <i class="far fa-clock mr-1"></i>完成时间: ${step.completed_at ? new Date(step.completed_at).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '-'}
                                </span>
                            </div>
                            ${step.note ? `<div class="mt-2 text-sm text-gray-600 bg-gray-50 p-2 rounded-lg"><i class="fas fa-sticky-note text-gray-400 mr-1"></i>${step.note}</div>` : ''}
                        `}

                        <div class="mt-3">
                            <div class="step-photo-preview" id="photos-${taskId}-${idx}">
                                ${photos.map(p => `
                                    <div class="photo-item" data-photo-id="${p.id}">
                                        <img src="${p.photo_url}" alt="照片" 
                                            onerror="this.parentElement.innerHTML='<div class=\\'img-error\\'><i class=\\'fas fa-image\\'></i></div>'"
                                            onclick="event.stopPropagation(); window.open('${p.photo_url}', '_blank');">
                                        ${isToday && !isDone ? `<div class="delete-btn" onclick="event.stopPropagation(); deleteStepPhoto(${taskId}, ${idx}, ${p.id}, '${p.photo_url}')" title="删除"><i class="fas fa-times"></i></div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                            ${isToday && !isDone ? `
                                <label for="photo-input-${taskId}-${idx}" class="photo-upload-btn">
                                    <i class="fas fa-camera"></i>
                                    <span>上传图片</span>
                                </label>
                                <input type="file" id="photo-input-${taskId}-${idx}" class="hidden" accept="image/*" onchange="handlePhotoUpload(${taskId}, ${idx}, this)">
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    openModal('task-modal', 'task-modal-content');
}

function closeTaskModal() {
    const modal = document.getElementById('task-modal');
    const content = document.getElementById('task-modal-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); currentTaskId = null; }, 300);
}

// 加载整月任务数据（用于日历小红点）
async function loadMonthSopTasks(year, month) {
    if (typeof supabase === 'undefined' || !window.supabase) return [];
    try {
        const start = `${year}-${String(month + 1).padStart(2, '0')}-01`;
        const end = `${year}-${String(month + 1).padStart(2, '0')}-${new Date(year, month + 1, 0).getDate()}`;
        const { data, error } = await window.supabase.from('sop_tasks')
            .select('id, date, person_id')
            .gte('date', start)
            .lte('date', end);
        if (error) {
            console.error('[loadMonthSopTasks] 错误:', error);
            return [];
        }
        return data || [];
    } catch (e) {
        console.error('[loadMonthSopTasks] 异常:', e);
        return [];
    }
}

async function completeStep(taskId, stepIndex) {
    const task = taskData.find(t => t.id === taskId);
    if (!task || !task.steps[stepIndex]) return;

    // 只能编辑当天的任务
    if (selectedDate !== new Date().toISOString().split('T')[0]) {
        showToast('操作受限', '只能编辑当天的任务', 'warning');
        return;
    }

    const noteEl = document.getElementById(`note-${taskId}-${stepIndex}`);
    const note = noteEl ? noteEl.value.trim() : '';

    if (task.steps[stepIndex].require_photo) {
        const photos = await loadStepPhotos(taskId, stepIndex);
        if (photos.length === 0) {
            showToast('需要拍照', '此步骤要求上传照片后才能标记完成', 'warning');
            return;
        }
    }

    task.steps[stepIndex].done = true;
    task.steps[stepIndex].completed_at = new Date().toISOString();
    task.steps[stepIndex].note = note;

    const allDone = task.steps.every(s => s.done);
    if (allDone) {
        task.status = 'completed';
        task.completed_at = new Date().toISOString();
        showToast('任务完成', '所有步骤已完成，任务已标记为完成');
    } else {
        task.status = 'progress';
        showToast('步骤完成', `"${task.steps[stepIndex].name}" 已标记完成`);
    }

    try {
        await saveSopTask(task);
        taskData = await loadSopTasks(selectedDate);
        // 普通用户只显示自己的任务
        if (!authGuard.isAdmin()) {
            const myPersonId = authGuard.getCurrentPersonId();
            taskData = taskData.filter(t => t.person_id === myPersonId);
        }
    } catch (e) {
        console.error('completeStep 保存失败:', e);
        showToast('保存失败', '数据库连接异常，数据仅本地有效', 'warning');
    }
    renderTasks();
    openTaskDetail(taskId);
}

async function handlePhotoUpload(taskId, stepIndex, input) {
    // 只能编辑当天的任务
    if (selectedDate !== new Date().toISOString().split('T')[0]) {
        showToast('操作受限', '只能编辑当天的任务', 'warning');
        input.value = '';
        return;
    }

    const file = input.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        showToast('格式错误', '请上传图片文件', 'warning');
        return;
    }

    if (file.size > 5 * 1024 * 1024) {
        showToast('文件过大', '图片大小不能超过 5MB', 'warning');
        return;
    }

    showToast('上传中', '正在上传图片...', 'info');

    try {
        const fileExt = file.name.split('.').pop();
        const fileName = `${taskId}_${stepIndex}_${Date.now()}.${fileExt}`;
        const filePath = `task-${taskId}/${fileName}`;

        const { data: uploadData, error: uploadError } = await supabase.storage
            .from('sop-photos')
            .upload(filePath, file, {
                cacheControl: '3600',
                upsert: false
            });

        if (uploadError) {
            console.error('Upload error:', uploadError);
            throw new Error(uploadError.message || '上传失败');
        }

        const { data: urlData } = supabase.storage
            .from('sop-photos')
            .getPublicUrl(filePath);

        const photoUrl = urlData?.publicUrl || urlData?.publicURL || urlData?.url;
        console.log('Photo URL:', photoUrl);

        if (!photoUrl) {
            throw new Error('无法获取图片 URL');
        }

        const { error: dbError } = await supabase
            .from('task_photos')
            .insert({
                task_id: taskId,
                step_index: stepIndex,
                photo_url: photoUrl,
                uploaded_at: new Date().toISOString()
            });

        if (dbError) throw dbError;

        const task = taskData.find(t => t.id === taskId);
        if (task && task.steps[stepIndex]) {
            if (!task.steps[stepIndex].photos) task.steps[stepIndex].photos = [];
            task.steps[stepIndex].photos.push(photoUrl);
        }

        await refreshStepPhotos(taskId, stepIndex);
        showToast('上传成功', '照片已保存');

    } catch (err) {
        console.error('handlePhotoUpload error:', err);
        showToast('上传失败', err.message || '图片上传失败，请重试', 'error');
    }

    input.value = '';
}

async function refreshStepPhotos(taskId, stepIndex) {
    const photos = await loadStepPhotos(taskId, stepIndex);
    const container = document.getElementById(`photos-${taskId}-${stepIndex}`);
    if (!container) return;

    const task = taskData.find(t => t.id === taskId);
    const isDone = task?.steps[stepIndex]?.done || false;

    container.innerHTML = photos.map(p => `
        <div class="photo-item" data-photo-id="${p.id}">
            <img src="${p.photo_url}" alt="照片" 
                onerror="this.parentElement.innerHTML='<div class=\\'img-error\\'><i class=\\'fas fa-image\\'></i></div>'"
                onclick="event.stopPropagation(); window.open('${p.photo_url}', '_blank');">
            ${!isDone ? `<div class="delete-btn" onclick="event.stopPropagation(); deleteStepPhoto(${taskId}, ${stepIndex}, ${p.id}, '${p.photo_url}')" title="删除"><i class="fas fa-times"></i></div>` : ''}
        </div>
    `).join('');
}

async function deleteStepPhoto(taskId, stepIndex, photoId, photoUrl) {
    // 只能编辑当天的任务
    if (selectedDate !== new Date().toISOString().split('T')[0]) {
        showToast('操作受限', '只能编辑当天的任务', 'warning');
        return;
    }
    if (!confirm('确定删除这张图片吗？')) return;

    showToast('删除中', '正在删除图片...', 'info');

    try {
        const { error: dbError } = await supabase
            .from('task_photos')
            .delete()
            .eq('id', photoId);

        if (dbError) throw dbError;

        try {
            const urlObj = new URL(photoUrl);
            const pathMatch = urlObj.pathname.match(/\/sop-photos\/(.+)/);
            if (pathMatch) {
                await supabase.storage.from('sop-photos').remove([pathMatch[1]]);
            }
        } catch (storageErr) {
            console.warn('Storage 删除失败（可能已不存在）:', storageErr);
        }

        await refreshStepPhotos(taskId, stepIndex);
        showToast('删除成功', '图片已删除');

    } catch (err) {
        console.error('deleteStepPhoto error:', err);
        showToast('删除失败', err.message || '删除图片失败', 'error');
    }
}

// ==================== 删除任务（含图片清理）====================
function deleteCurrentTask() {
    if (!currentTaskId) return;
    deletingTaskId = currentTaskId;
    openModal('delete-task-modal', 'delete-task-content');
}

function closeDeleteTaskModal() {
    const modal = document.getElementById('delete-task-modal');
    const content = document.getElementById('delete-task-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); deletingTaskId = null; }, 300);
}

async function confirmDeleteTask() {
    if (!deletingTaskId) return;

    showToast('删除中', '正在清理任务数据...', 'info');

    try {
        // 1. 先获取该任务的所有照片
        const { data: allPhotos, error: photoListError } = await supabase
            .from('task_photos')
            .select('id, photo_url')
            .eq('task_id', deletingTaskId);

        if (photoListError) throw photoListError;

        // 2. 删除 storage 中的图片
        if (allPhotos && allPhotos.length > 0) {
            for (const photo of allPhotos) {
                try {
                    const urlObj = new URL(photo.photo_url);
                    const pathMatch = urlObj.pathname.match(/\/sop-photos\/(.+)/);
                    if (pathMatch) {
                        await supabase.storage.from('sop-photos').remove([pathMatch[1]]);
                    }
                } catch (storageErr) {
                    console.warn('删除 storage 图片失败:', storageErr);
                }
            }
        }

        // 3. 删除 task_photos 表记录
        await supabase.from('task_photos').delete().eq('task_id', deletingTaskId);

        // 4. 删除 sop_tasks 记录
        await deleteSopTask(deletingTaskId);

        // 5. 更新本地数据
        taskData = taskData.filter(t => t.id !== deletingTaskId);
        renderTasks();
        closeTaskModal();
        closeDeleteTaskModal();
        showToast('删除成功', '任务及相关图片已清除');
    } catch (err) {
        console.error('confirmDeleteTask error:', err);
        showToast('删除失败', err.message || '删除任务失败', 'error');
        closeDeleteTaskModal();
    }
}

async function refreshTasks() {
    // 刷新按钮已移除：排班后任务自动同步生成，无需手动刷新
    showToast('提示', '排班后任务会自动同步生成，无需手动刷新', 'info');
}

function openModal(modalId, contentId) {
    const modal = document.getElementById(modalId);
    const content = document.getElementById(contentId);
    modal.classList.remove('hidden');
    setTimeout(() => {
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    }, 10);
}

function showToast(title, message, type = 'success') {
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toast-title');
    const toastMessage = document.getElementById('toast-message');
    const iconDiv = toast.querySelector('div:first-child');

    toastTitle.textContent = title;
    toastMessage.textContent = message;

    const config = {
        success: { bg: 'bg-emerald-100', text: 'text-emerald-600', icon: 'fa-check' },
        warning: { bg: 'bg-amber-100', text: 'text-amber-600', icon: 'fa-exclamation-triangle' },
        error: { bg: 'bg-red-100', text: 'text-red-600', icon: 'fa-times-circle' },
        info: { bg: 'bg-blue-100', text: 'text-blue-600', icon: 'fa-info-circle' }
    };
    const c = config[type] || config.success;

    iconDiv.className = `w-10 h-10 ${c.bg} rounded-full flex items-center justify-center ${c.text} flex-shrink-0`;
    iconDiv.innerHTML = `<i class="fas ${c.icon}"></i>`;

    toast.classList.remove('translate-y-20', 'opacity-0');
    setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
}

function updateTime() {
    const now = new Date();
    document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

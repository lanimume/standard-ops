    <main class="flex-1 overflow-y-auto bg-gray-50/50">

                    </div>

<div id="toast" class="fixed bottom-6 right-6 bg-white rounded-xl shadow-2xl border border-gray-100 p-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 max-w-sm">

        <i class="fas fa-check"></i>
    </div>
    <div>
        <h4 class="font-bold text-gray-800 text-sm" id="toast-title">操作成功</h4>
        <p class="text-xs text-gray-500 mt-0.5" id="toast-message">SOP 状态已更新</p>
    </div>
</div>

<script src="supabase.js"></script>
<script>
let charts = {};
const today = new Date().toISOString().split('T')[0];

document.addEventListener('DOMContentLoaded', async () => {
    updateTime();
    setInterval(updateTime, 1000);

    // 权限检查
    const authorized = await authGuard.init();
    if (!authorized) return;

    // 初始化 Supabase 客户端
    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        } else if (typeof supabase !== 'undefined') {
            window.supabase = supabase;
        }
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        document.getElementById('system-status').textContent = '离线模式';
        document.getElementById('status-dot').classList.remove('bg-white', 'animate-pulse');
        document.getElementById('status-dot').classList.add('bg-red-400');
        document.getElementById('status-text').textContent = '数据库未连接';
    }

    let personnel = [];
    let tasks = [];

    try {
        personnel = await loadPersonnel();
        tasks = await loadSopTasks(today);

        // 普通用户只显示自己的任务
        if (!authGuard.isAdmin()) {
            tasks = authGuard.filterDataByPermission(tasks);
        }
    } catch (e) {
        console.error('数据加载失败:', e);
        showToast('警告', '数据库连接失败，显示离线数据', 'warning');
    }

    document.getElementById('loading').classList.add('hidden');

    updateKPIs(tasks, personnel);
    initCharts(tasks, personnel);
    renderTodayTasks(tasks);
});

function updateKPIs(tasks, personnel) {
    const total = tasks.length;
    const completed = tasks.filter(t => t.status === 'completed').length;
    const active = tasks.filter(t => t.status === 'progress').length;
    const rate = total > 0 ? Math.round(completed / total * 100) : 0;

    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-completed').textContent = completed;
    document.getElementById('kpi-active').textContent = active;
    document.getElementById('kpi-rate').textContent = rate + '%';

    document.getElementById('kpi-total-bar').style.width = '100%';
    document.getElementById('kpi-completed-bar').style.width = rate + '%';
    document.getElementById('kpi-rate-bar').style.width = rate + '%';
}

function initCharts(tasks, personnel) {
    const personStats = {};
    personnel.forEach(p => personStats[p.name] = { completed: 0, total: 0 });
    tasks.forEach(t => {
        const name = t.person?.name || '未知';
        if (!personStats[name]) personStats[name] = { completed: 0, total: 0 };
        personStats[name].total++;
        if (t.status === 'completed') personStats[name].completed++;
    });

    const ctx1 = document.getElementById('personTaskChart').getContext('2d');
    charts.personTask = new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: Object.keys(personStats),
            datasets: [{
                label: '已完成',
                data: Object.values(personStats).map(s => s.completed),
                backgroundColor: '#10b981',
                borderRadius: 8,
                barThickness: 24
            }, {
                label: '未完成',
                data: Object.values(personStats).map(s => s.total - s.completed),
                backgroundColor: '#e5e7eb',
                borderRadius: 8,
                barThickness: 24
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top', align: 'end' } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                x: { grid: { display: false } }
            }
        }
    });

    const statusCount = {
        completed: tasks.filter(t => t.status === 'completed').length,
        progress: tasks.filter(t => t.status === 'progress').length,
        pending: tasks.filter(t => t.status === 'pending').length
    };

    const ctx2 = document.getElementById('taskStatusChart').getContext('2d');
    charts.taskStatus = new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: ['已完成', '进行中', '待开始'],
            datasets: [{
                data: [statusCount.completed, statusCount.progress, statusCount.pending],
                backgroundColor: ['#10b981', '#f59e0b', '#3b82f6'],
                borderWidth: 0, hoverOffset: 4
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } }
            }
        }
    });
}

function renderTodayTasks(tasks) {
    const container = document.getElementById('today-tasks-list');
    if (tasks.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-4">今日暂无任务</p>';
        return;
    }

    container.innerHTML = tasks.slice(0, 6).map(task => {
        const statusConfig = {
            completed: { label: '已完成', color: 'bg-emerald-100 text-emerald-700', icon: 'fa-check-circle' },
            progress: { label: '进行中', color: 'bg-amber-100 text-amber-700', icon: 'fa-spinner fa-spin' },
            pending: { label: '待开始', color: 'bg-blue-100 text-blue-700', icon: 'fa-clock' }
        };
        const s = statusConfig[task.status];
        const doneSteps = (task.steps || []).filter(st => st.done).length;
        const totalSteps = (task.steps || []).length;

        return `
            <div class="flex items-center justify-between p-4 rounded-xl hover:bg-gray-50 transition-colors border border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 ${task.person?.color || 'bg-gray-500'} rounded-xl flex items-center justify-center text-white font-bold text-sm">
                        ${task.person?.avatar || task.person?.name?.charAt(0) || '?'}
                    </div>
                    <div>
                        <h4 class="font-medium text-gray-800">${task.sop_template?.title || '未知任务'}</h4>
                        <p class="text-sm text-gray-500">${task.person?.name || '未分配'} · ${task.sop_template?.category || ''}</p>
                    </div>
                </div>
                <div class="text-right">
                    <span class="inline-block px-2.5 py-1 rounded-lg text-xs font-medium ${s.color} mb-1">
                        <i class="fas ${s.icon} mr-1"></i>${s.label}
                    </span>
                    <p class="text-xs text-gray-400">${doneSteps}/${totalSteps} 步骤</p>
                </div>
            </div>
        `;
    }).join('');
}
</script>

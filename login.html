<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 标准化作业管理 管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        .login-bg {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 50%, #a7f3d0 100%);
        }
        .login-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
<base target="_blank">

<style>
[data-theme="dark"] body {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%) !important;
}
[data-theme="dark"] .login-card {
  background: rgba(30, 41, 59, 0.95) !important;
  border-color: #334155 !important;
}
[data-theme="dark"] .login-card h1,
[data-theme="dark"] .login-card label {
  color: #f1f5f9 !important;
}
[data-theme="dark"] .login-card input {
  background: #0f172a !important;
  border-color: #334155 !important;
  color: #f1f5f9 !important;
}
[data-theme="dark"] .login-card p {
  color: #94a3b8 !important;
}
</style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">

    <div class="relative w-full max-w-md">
    <div class="login-card w-full max-w-md rounded-3xl shadow-2xl p-8 border border-white/50 relative">
        <div class="absolute top-4 right-4">
            <button onclick="toggleTheme()" class="theme-toggle-btn" title="切换深浅模式">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-500 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-indigo-200">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">标准化作业管理</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统 v5.0</p>
        </div>

        <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">账号</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="username" 
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all bg-white/80" 
                        placeholder="请输入账号" autocomplete="off" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="password" id="password" 
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all bg-white/80" 
                        placeholder="请输入密码" required>
                </div>
            </div>

            <div id="error-msg" class="hidden text-sm text-red-500 bg-red-50 px-4 py-2 rounded-lg">
                <i class="fas fa-exclamation-circle mr-1"></i><span id="error-text"></span>
            </div>

            <button type="submit" id="login-btn"
                class="w-full py-3.5 rounded-xl bg-indigo-500 text-white font-bold text-sm hover:bg-indigo-600 transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                <span>登录</span>
                <i id="login-spinner" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">账号由管理员统一分配，如需账号请联系管理员</p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        // 初始化 Supabase
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        }

        // 检查是否已登录
        if (sessionStorage.getItem('authUser')) {
            const user = JSON.parse(sessionStorage.getItem('authUser'));
            window.location.href = user.role === 'admin' ? 'index.html' : 'calendar.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // 1. 先查 admins 表（管理员）
                const { data: admin, error: adminError } = await window.supabase
                    .from('admins')
                    .select('id, name, username')
                    .eq('username', username)
                    .eq('password_hash', password)
                    .single();

                if (admin && !adminError) {
                    // 管理员登录成功
                    sessionStorage.setItem('authUser', JSON.stringify({
                        id: admin.id,
                        name: admin.name,
                        username: admin.username,
                        role: 'admin'
                    }));
                    window.location.href = 'index.html';
                    return;
                }

                // 2. 再查 personnel 表（普通用户）
                const { data: person, error: personError } = await window.supabase
                    .from('personnel')
                    .select('id, name, username')
                    .eq('username', username)
                    .eq('password_hash', password)
                    .single();

                if (person && !personError) {
                    // 普通用户登录成功
                    sessionStorage.setItem('authUser', JSON.stringify({
                        id: person.id,
                        name: person.name,
                        username: person.username,
                        role: 'user',
                        personId: person.id
                    }));
                    window.location.href = 'calendar.html';
                    return;
                }

                // 登录失败
                throw new Error('账号或密码错误');

            } catch (err) {
                console.error('登录失败:', err);
                errorText.textContent = '账号或密码错误';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>

<!-- 主题切换初始化 -->
<script>
(function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
})();

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
    } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
    }
}
</script>
</body>
</html>

<div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-20 shadow-lg flex-shrink-0">
        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-emerald-200 shadow-lg">
                    <i class="fas fa-shield-halved text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg text-gray-900 leading-tight">标准化作业管理</h1>
                    <p class="text-xs text-gray-500">管理系统 v5.0</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="index.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-chart-pie w-5"></i>数据概览
            </a>
            <a href="sop-templates.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-list-check w-5"></i>SOP流程模板
            </a>
            <a href="shift-schedule.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-users-gear w-5"></i>排班管理
            </a>
            <a href="calendar.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-calendar-days w-5"></i>任务日历
            </a>
            <a href="personnel.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-users w-5"></i>人员管理
            </a>
            <a href="metrics.html" target="_self" class="nav-item active bg-emerald-50 text-emerald-700 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-gauge-high w-5"></i>指标监控
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <div class="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-xl p-4 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-xs opacity-90 mb-1">系统状态</p>
                    <p class="font-bold text-sm" id="system-status">运行正常</p>
                    <div class="mt-2 flex items-center gap-2 text-xs opacity-90">
                        <span class="w-2 h-2 bg-white rounded-full animate-pulse" id="status-dot"></span><span id="status-text">实时同步中</span>
                    </div>
                </div>
                <i class="fas fa-wifi absolute -right-2 -bottom-2 text-6xl opacity-10"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-gray-50/50">
        <header class="sticky top-0 z-10 glass-effect border-b border-gray-200 px-8 py-4 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">指标监控</h2>
                <p class="text-sm text-gray-500 mt-1">关键绩效指标实时计算与追踪</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm">
                    <i class="far fa-clock text-emerald-500"></i>
                    <span id="current-time" class="text-sm font-medium text-gray-700"></span>
                </div>
                <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                    <div class="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-700 font-bold text-sm">管</div>
                    <div class="hidden md:block">
                        <p class="text-sm font-medium text-gray-800">管理员</p>
                        <p class="text-xs text-gray-500">食品安全部</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
                    <div class="relative w-32 h-32 mx-auto mb-4">
                        <svg class="w-full h-full progress-ring" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                            <circle id="ring-submit" cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-2xl font-bold text-gray-800" id="metric-submit-val">--%</span>
                        </div>
                    </div>
                    <h4 class="font-bold text-gray-800">任务完成率</h4>
                    <p class="text-sm text-gray-500 mt-1">目标: 95%</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
                    <div class="relative w-32 h-32 mx-auto mb-4">
                        <svg class="w-full h-full progress-ring" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                            <circle id="ring-standard" cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-2xl font-bold text-gray-800" id="metric-standard-val">--%</span>
                        </div>
                    </div>
                    <h4 class="font-bold text-gray-800">步骤达标率</h4>
                    <p class="text-sm text-gray-500 mt-1">目标: 90%</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center">
                    <div class="relative w-32 h-32 mx-auto mb-4">
                        <svg class="w-full h-full progress-ring" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                            <circle id="ring-complete" cx="50" cy="50" r="45" fill="none" stroke="#f59e0b" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-2xl font-bold text-gray-800" id="metric-complete-val">--%</span>
                        </div>
                    </div>
                    <h4 class="font-bold text-gray-800">人员参与率</h4>
                    <p class="text-sm text-gray-500 mt-1">目标: 85%</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg text-gray-800 mb-6">人员任务完成趋势</h3>
                <div class="h-80">
                    <canvas id="metricsTrendChart"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 bg-white rounded-xl shadow-2xl border border-gray-100 p-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 max-w-sm">
    <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 flex-shrink-0">
        <i class="fas fa-check"></i>
    </div>
    <div>
        <h4 class="font-bold text-gray-800 text-sm" id="toast-title">操作成功</h4>
        <p class="text-xs text-gray-500 mt-0.5" id="toast-message">指标已更新</p>
    </div>
</div>

<script src="supabase.js"></script>
<script>
let charts = {};
const today = '2026-06-13';

document.addEventListener('DOMContentLoaded', async () => {
    updateTime();
    setInterval(updateTime, 1000);

    // 权限检查（仅管理员可访问）
    const authorized = await authGuard.init();
    if (!authorized) return;

    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        } else if (typeof supabase !== 'undefined') {
            window.supabase = supabase;
        }
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        document.getElementById('system-status').textContent = '离线模式';
        document.getElementById('status-dot').classList.remove('bg-white', 'animate-pulse');
        document.getElementById('status-dot').classList.add('bg-red-400');
        document.getElementById('status-text').textContent = '数据库未连接';
    }

    let tasks = [];
    let personnel = [];

    try {
        tasks = await loadSopTasks(today);
        personnel = await loadPersonnel();
    } catch (e) {
        console.error('数据加载失败:', e);
        showToast('警告', '数据库连接失败，显示离线数据', 'warning');
    }

    document.getElementById('loading').classList.add('hidden');

    updateRings(tasks, personnel);
    initTrendChart(tasks, personnel);
});

function updateRings(tasks, personnel) {
    const total = tasks.length;
    const completed = tasks.filter(t => t.status === 'completed').length;
    const taskRate = total > 0 ? (completed / total * 100).toFixed(1) : 0;

    const totalSteps = tasks.reduce((acc, t) => acc + (t.steps || []).length, 0);
    const doneSteps = tasks.reduce((acc, t) => acc + (t.steps || []).filter(s => s.done).length, 0);
    const stepRate = totalSteps > 0 ? (doneSteps / totalSteps * 100).toFixed(1) : 0;

    const activePersons = new Set(tasks.map(t => t.person_id)).size;
    const personRate = personnel.length > 0 ? (activePersons / personnel.length * 100).toFixed(1) : 0;

    document.getElementById('metric-submit-val').textContent = taskRate + '%';
    document.getElementById('metric-standard-val').textContent = stepRate + '%';
    document.getElementById('metric-complete-val').textContent = personRate + '%';

    const circumference = 2 * Math.PI * 45;
    document.getElementById('ring-submit').style.strokeDashoffset = circumference * (1 - taskRate / 100);
    document.getElementById('ring-standard').style.strokeDashoffset = circumference * (1 - stepRate / 100);
    document.getElementById('ring-complete').style.strokeDashoffset = circumference * (1 - personRate / 100);
}

function initTrendChart(tasks, personnel) {
    const ctx = document.getElementById('metricsTrendChart').getContext('2d');
    charts.trend = new Chart(ctx, {
        type: 'line',
        data: {
            labels: personnel.map(p => p.name),
            datasets: [{
                label: '已完成步骤',
                data: personnel.map(p => {
                    const pTasks = tasks.filter(t => t.person_id === p.id);
                    return pTasks.reduce((acc, t) => acc + (t.steps || []).filter(s => s.done).length, 0);
                }),
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3
            }, {
                label: '总步骤',
                data: personnel.map(p => {
                    const pTasks = tasks.filter(t => t.person_id === p.id);
                    return pTasks.reduce((acc, t) => acc + (t.steps || []).length, 0);
                }),
                borderColor: '#e5e7eb',
                backgroundColor: 'rgba(229, 231, 235, 0.1)',
                fill: true, tension: 0.4, borderWidth: 3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                x: { grid: { display: false } }
            }
        }
    });
}
</script>
</body>
</html>

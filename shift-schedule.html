<!DOCTYPE html>
<html lang="zh-CN">

<body class="bg-gray-50 text-gray-800">

<div class="flex h-screen overflow-hidden">

        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="index.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">

            </a>
            <a href="sop-templates.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">

            <a href="shift-schedule.html" target="_self" class="nav-item active bg-emerald-50 text-emerald-700 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">

            </a>
            <a href="calendar.html" target="_self" class="nav-item text-gray-600 hover:bg-gray-50 w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                <i class="fas fa-calendar-days w-5"></i>任务日历

        <div class="p-4 border-t border-gray-100">

    <main class="flex-1 overflow-y-auto bg-gray-50/50">
        <header class="sticky top-0 z-10 glass-effect border-b border-gray-200 px-8 py-4 flex items-center justify-between">

                <h2 class="text-2xl font-bold text-gray-800">排班管理</h2>

            </div>
            <div class="flex items-center gap-4">

                    <span id="current-time" class="text-sm font-medium text-gray-700"></span>
                </div>
                <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                    <div class="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-700 font-bold text-sm">管</div>
                    <div class="hidden md:block">
                        <p class="text-sm font-medium text-gray-800">管理员</p>

                    </div>
                </div>
            </div>
        </header>

        <div class="p-8 space-y-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">班次管理</h3>
                        <p class="text-sm text-gray-500 mt-1">定义班次并关联对应的 SOP 流程模板</p>
                    </div>
                    <button onclick="showShiftModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium shadow-lg shadow-emerald-200 transition-all flex items-center gap-2">
                        <i class="fas fa-plus"></i> 新建班次
                    </button>
                </div>
                <div id="shift-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">人员排班表</h3>
                        <p class="text-sm text-gray-500 mt-1">为每位人员分配每日班次，下拉框选择班次</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeScheduleMonth(-1)" class="w-10 h-10 rounded-xl border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <h3 class="font-bold text-lg text-gray-800" id="schedule-month-year"></h3>
                        <button onclick="changeScheduleMonth(1)" class="w-10 h-10 rounded-xl border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="schedule-table overflow-x-auto rounded-xl border border-gray-200">
                    <table class="w-full text-sm">
                        <thead id="schedule-head"><tr></tr></thead>
                        <tbody id="schedule-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
                <div class="mt-4 flex items-center gap-4 text-xs text-gray-500">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-gray-100 border border-gray-200"></span> 未排班</span>
                    <span id="shift-legend" class="flex items-center gap-2"></span>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="shift-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center modal-overlay">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="shift-modal-content">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-xl text-gray-800" id="shift-modal-title">新建班次</h3>
            <button onclick="closeShiftModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">班次名称 <span class="text-red-500">*</span></label>
                <input type="text" id="shift-name" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all" placeholder="如：A班、早班、白班">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">班次颜色</label>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="selectShiftColor('bg-blue-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-blue-500 ring-2 ring-offset-2 ring-transparent hover:ring-blue-300 transition-all" data-color="bg-blue-500"></button>
                    <button onclick="selectShiftColor('bg-emerald-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-emerald-500 ring-2 ring-offset-2 ring-transparent hover:ring-emerald-300 transition-all" data-color="bg-emerald-500"></button>
                    <button onclick="selectShiftColor('bg-amber-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-amber-500 ring-2 ring-offset-2 ring-transparent hover:ring-amber-300 transition-all" data-color="bg-amber-500"></button>
                    <button onclick="selectShiftColor('bg-red-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-red-500 ring-2 ring-offset-2 ring-transparent hover:ring-red-300 transition-all" data-color="bg-red-500"></button>
                    <button onclick="selectShiftColor('bg-purple-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-purple-500 ring-2 ring-offset-2 ring-transparent hover:ring-purple-300 transition-all" data-color="bg-purple-500"></button>
                    <button onclick="selectShiftColor('bg-pink-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-pink-500 ring-2 ring-offset-2 ring-transparent hover:ring-pink-300 transition-all" data-color="bg-pink-500"></button>
                    <button onclick="selectShiftColor('bg-indigo-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-indigo-500 ring-2 ring-offset-2 ring-transparent hover:ring-indigo-300 transition-all" data-color="bg-indigo-500"></button>
                    <button onclick="selectShiftColor('bg-teal-500')" class="shift-color-btn w-8 h-8 rounded-lg bg-teal-500 ring-2 ring-offset-2 ring-transparent hover:ring-teal-300 transition-all" data-color="bg-teal-500"></button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">关联 SOP 流程（多选）</label>
                <div id="shift-sop-options" class="space-y-2 max-h-48 overflow-y-auto p-2 border border-gray-100 rounded-xl"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">备注说明</label>
                <textarea id="shift-desc" rows="2" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all resize-none" placeholder="可选"></textarea>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeShiftModal()" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">取消</button>
                <button onclick="saveShiftForm()" class="flex-1 py-2.5 rounded-xl bg-emerald-500 text-white font-medium hover:bg-emerald-600 transition-colors">保存</button>
            </div>
        </div>
    </div>
</div>

<div id="delete-shift-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center modal-overlay">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm mx-4 shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="delete-shift-content">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-500 mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
            </div>
            <h3 class="font-bold text-lg text-gray-800">确认删除班次</h3>
            <p class="text-sm text-gray-500 mt-2">删除后相关的排班记录也会被清除，确定要继续吗？</p>
        </div>
        <div class="flex gap-3">
            <button onclick="closeDeleteShiftModal()" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">取消</button>
            <button onclick="confirmDeleteShift()" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600 transition-colors">删除</button>
        </div>
    </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 bg-white rounded-xl shadow-2xl border border-gray-100 p-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 max-w-sm">
    <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 flex-shrink-0">
        <i class="fas fa-check"></i>
    </div>
    <div>
        <h4 class="font-bold text-gray-800 text-sm" id="toast-title">操作成功</h4>
        <p class="text-xs text-gray-500 mt-0.5" id="toast-message">排班已更新</p>
    </div>
</div>

<script src="supabase.js"></script>
<script>
let sopTemplates = [];
let shiftData = [];
let personnelData = [];
let scheduleData = [];
let scheduleDate = new Date();
let editingShiftId = null;
let deletingShiftId = null;
let selectedShiftColor = 'bg-blue-500';

const defaultShifts = [
    { name: 'A班（早班）', color: 'bg-blue-500', sop_ids: [], description: '负责原料检验和生产加工' },
    { name: 'B班（中班）', color: 'bg-emerald-500', sop_ids: [], description: '负责仓储管理和清洗消毒' },
    { name: 'C班（晚班）', color: 'bg-amber-500', sop_ids: [], description: '负责添加剂管理和废弃物处置' }
];

document.addEventListener('DOMContentLoaded', async () => {
    updateTime();
    setInterval(updateTime, 1000);

    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        } else if (typeof supabase !== 'undefined') {
            window.supabase = supabase;
        }
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        document.getElementById('system-status').textContent = '离线模式';
        document.getElementById('status-dot').classList.remove('bg-white', 'animate-pulse');
        document.getElementById('status-dot').classList.add('bg-red-400');
        document.getElementById('status-text').textContent = '数据库未连接';
    }

    try {
        sopTemplates = await loadSopTemplates();
        shiftData = await loadShifts();
        personnelData = await loadPersonnel();

        if (shiftData.length === 0) {
            for (const s of defaultShifts) {
                await saveShift(s);
            }
            shiftData = await loadShifts();
        }

        if (personnelData.length === 0) {
            await initDefaultPersonnel();
            personnelData = await loadPersonnel();
        }

        const year = scheduleDate.getFullYear();
        const month = scheduleDate.getMonth();
        scheduleData = await loadSchedules(month, year);
    } catch (e) {
        console.error('数据加载失败:', e);
        showToast('警告', '数据库连接失败，使用离线数据', 'warning');
        shiftData = defaultShifts.map((s, i) => ({ ...s, id: i + 1 }));
    }

    document.getElementById('loading').classList.add('hidden');
    renderShifts();
    renderScheduleTable();
});

async function initDefaultPersonnel() {
    if (!isSupabaseReady()) return;
    const defaults = [
        { name: '张检验员', role: '检验员', dept: '进货查验部', phone: '13800138001', avatar: '张', color: 'bg-blue-500' },
        { name: '李班长', role: '班长', dept: '生产部', phone: '13800138002', avatar: '李', color: 'bg-emerald-500' },
        { name: '王仓管', role: '仓管', dept: '仓储部', phone: '13800138003', avatar: '王', color: 'bg-amber-500' },
        { name: '刘阿姨', role: '后勤', dept: '后勤部', phone: '13800138004', avatar: '刘', color: 'bg-purple-500' },
        { name: '赵厨师长', role: '厨师长', dept: '生产部', phone: '13800138005', avatar: '赵', color: 'bg-red-500' },
        { name: '陈后勤', role: '后勤', dept: '后勤部', phone: '13800138006', avatar: '陈', color: 'bg-teal-500' },
        { name: '孙质检', role: '检验员', dept: '质检部', phone: '13800138007', avatar: '孙', color: 'bg-indigo-500' },
        { name: '周管理', role: '管理员', dept: '质检部', phone: '13800138008', avatar: '周', color: 'bg-gray-500' }
    ];
    for (const p of defaults) {
        try { 
            const { error } = await window.supabase.from('personnel').insert(p);
            if (error) console.error('initDefaultPersonnel insert error:', error);
        } catch (e) { console.error('initDefaultPersonnel error:', e); }
    }
}

function renderShifts() {
    const grid = document.getElementById('shift-grid');
    grid.innerHTML = '';
    if (shiftData.length === 0) {
        grid.innerHTML = '<p class="text-gray-400 text-center py-8 col-span-full">暂无班次，点击上方按钮创建</p>';
        return;
    }
    shiftData.forEach(shift => {
        const linkedSops = (shift.sop_ids || []).map(sid => {
            const s = sopTemplates.find(x => x.id === sid);
            return s ? s.title : `SOP #${sid}`;
        });
        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 card-hover';
        card.innerHTML = `
            <div class="flex items-start justify-between mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 ${shift.color || 'bg-blue-500'} rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                        <i class="fas fa-users-gear"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">${shift.name}</h3>
                        <p class="text-xs text-gray-500">${shift.description || '无备注'}</p>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button onclick="editShift(${shift.id})" class="w-7 h-7 rounded-lg bg-gray-50 text-gray-400 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition-colors">
                        <i class="fas fa-pen text-xs"></i>
                    </button>
                    <button onclick="deleteShiftPrompt(${shift.id})" class="w-7 h-7 rounded-lg bg-gray-50 text-gray-400 hover:text-red-600 hover:bg-red-50 flex items-center justify-center transition-colors">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            </div>
            <div class="border-t border-gray-100 pt-3">
                <p class="text-xs text-gray-400 mb-2">关联 SOP 流程 (${linkedSops.length})</p>
                <div class="flex flex-wrap gap-1.5">
                    ${linkedSops.length > 0 ? linkedSops.map(title => `<span class="px-2 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600">${title}</span>`).join('') : '<span class="text-xs text-gray-400">未关联SOP</span>'}
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
    updateShiftLegend();
}

function updateShiftLegend() {
    const legend = document.getElementById('shift-legend');
    legend.innerHTML = shiftData.map(s => 
        `<span class="shift-tag ${s.color ? s.color.replace('bg-', 'bg-opacity-20 bg-') : 'bg-gray-100'} text-gray-700">
            <span class="w-2 h-2 rounded-full ${s.color || 'bg-gray-400'}"></span>${s.name}
        </span>`
    ).join('');
}

function showShiftModal() {
    editingShiftId = null;
    document.getElementById('shift-modal-title').textContent = '新建班次';
    document.getElementById('shift-name').value = '';
    document.getElementById('shift-desc').value = '';
    selectedShiftColor = 'bg-blue-500';
    updateShiftColorSelection();
    renderShiftSopOptions();
    openModal('shift-modal', 'shift-modal-content');
}

function editShift(id) {
    const shift = shiftData.find(s => s.id === id);
    if (!shift) return;
    editingShiftId = id;
    document.getElementById('shift-modal-title').textContent = '编辑班次';
    document.getElementById('shift-name').value = shift.name;
    document.getElementById('shift-desc').value = shift.description || '';
    selectedShiftColor = shift.color || 'bg-blue-500';
    updateShiftColorSelection();
    renderShiftSopOptions(shift.sop_ids || []);
    openModal('shift-modal', 'shift-modal-content');
}

function closeShiftModal() {
    const modal = document.getElementById('shift-modal');
    const content = document.getElementById('shift-modal-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); editingShiftId = null; }, 300);
}

function selectShiftColor(color) {
    selectedShiftColor = color;
    updateShiftColorSelection();
}

function updateShiftColorSelection() {
    document.querySelectorAll('.shift-color-btn').forEach(btn => {
        if (btn.dataset.color === selectedShiftColor) {
            btn.classList.add('ring-gray-400');
            btn.classList.remove('ring-transparent');
        } else {
            btn.classList.remove('ring-gray-400');
            btn.classList.add('ring-transparent');
        }
    });
}

function renderShiftSopOptions(selectedIds = []) {
    const container = document.getElementById('shift-sop-options');
    container.innerHTML = sopTemplates.map(sop => `
        <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
            <input type="checkbox" value="${sop.id}" class="rounded text-emerald-500 focus:ring-emerald-500 shift-sop-check" ${selectedIds.includes(sop.id) ? 'checked' : ''}>
            <span class="text-sm text-gray-700">${sop.title}</span>
            <span class="text-xs text-gray-400 ml-auto">${sop.category}</span>
        </label>
    `).join('');
}

async function saveShiftForm() {
    const name = document.getElementById('shift-name').value.trim();
    const description = document.getElementById('shift-desc').value.trim();
    if (!name) { showToast('输入错误', '请输入班次名称', 'error'); return; }

    const checkedBoxes = document.querySelectorAll('.shift-sop-check:checked');
    const sopIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));

    try {
        if (editingShiftId) {
            const shift = shiftData.find(s => s.id === editingShiftId);
            shift.name = name; shift.color = selectedShiftColor; shift.sop_ids = sopIds; shift.description = description;
            await saveShift(shift);
            showToast('保存成功', '班次信息已更新');
        } else {
            const newShift = { name, color: selectedShiftColor, sop_ids: sopIds, description };
            const saved = await saveShift(newShift);
            if (saved) { shiftData.push(saved); showToast('创建成功', '新班次已创建'); }
        }
    } catch (e) {
        showToast('保存失败', '数据库连接异常', 'error');
    }
    closeShiftModal();
    renderShifts();
    renderScheduleTable();
}

function deleteShiftPrompt(id) {
    deletingShiftId = id;
    openModal('delete-shift-modal', 'delete-shift-content');
}

function closeDeleteShiftModal() {
    const modal = document.getElementById('delete-shift-modal');
    const content = document.getElementById('delete-shift-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); deletingShiftId = null; }, 300);
}

async function confirmDeleteShift() {
    if (!deletingShiftId) return;
    try {
        await deleteShift(deletingShiftId);
        scheduleData = scheduleData.filter(s => s.shift_id !== deletingShiftId);
        const idx = shiftData.findIndex(s => s.id === deletingShiftId);
        if (idx > -1) { shiftData.splice(idx, 1); renderShifts(); renderScheduleTable(); showToast('删除成功', '班次已移除'); }
    } catch (e) {
        showToast('删除失败', '数据库连接异常', 'error');
    }
    closeDeleteShiftModal();
}

function renderScheduleTable() {
    const year = scheduleDate.getFullYear();
    const month = scheduleDate.getMonth();
    document.getElementById('schedule-month-year').textContent = `${year}年 ${month + 1}月`;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const thead = document.getElementById('schedule-head');
    const tbody = document.getElementById('schedule-body');

    let headHtml = '<th class="px-3 py-3 text-xs font-medium text-gray-500 uppercase whitespace-nowrap">人员 / 日期</th>';
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = dateStr === new Date().toISOString().split('T')[0];
        headHtml += `<th class="px-2 py-3 text-xs font-medium ${isToday ? 'text-emerald-600 bg-emerald-50' : 'text-gray-500'} text-center whitespace-nowrap min-w-[70px]">${d}日</th>`;
    }
    thead.innerHTML = `<tr>${headHtml}</tr>`;
    tbody.innerHTML = '';

    if (personnelData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="' + (daysInMonth + 1) + '" class="text-center py-8 text-gray-400">暂无人员数据，请先在人员管理中添加</td></tr>';
        return;
    }

    personnelData.forEach(person => {
        let rowHtml = `<td class="px-3 py-3 text-sm text-gray-800 whitespace-nowrap bg-white">${person.name}</td>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const schedule = scheduleData.find(s => s.person_id === person.id && s.date === dateStr);
            const shift = schedule ? shiftData.find(sh => sh.id === schedule.shift_id) : null;
            if (shift) {
                rowHtml += `<td class="schedule-cell px-1 py-2 text-center">
                    <select onchange="updateSchedule(${person.id}, '${dateStr}', this.value)" class="w-full text-xs py-1 px-1 rounded-lg border-0 ${shift.color ? shift.color.replace('bg-', 'bg-opacity-15 bg-') : 'bg-gray-100'} text-gray-700 cursor-pointer hover:bg-opacity-25 transition-all text-center">
                        <option value="">--</option>
                        ${shiftData.map(sh => `<option value="${sh.id}" ${sh.id === shift.id ? 'selected' : ''} class="text-gray-800 bg-white">${sh.name}</option>`).join('')}
                        <option value="remove" class="text-red-600 bg-white">清除</option>
                    </select>
                </td>`;
            } else {
                rowHtml += `<td class="schedule-cell px-1 py-2 text-center">
                    <select onchange="updateSchedule(${person.id}, '${dateStr}', this.value)" class="w-full text-xs py-1 px-1 rounded-lg border border-gray-200 text-gray-400 cursor-pointer hover:border-emerald-300 hover:text-emerald-600 transition-all text-center bg-transparent">
                        <option value="">--</option>
                        ${shiftData.map(sh => `<option value="${sh.id}" class="text-gray-800 bg-white">${sh.name}</option>`).join('')}
                    </select>
                </td>`;
            }
        }
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition-colors';
        tr.innerHTML = rowHtml;
        tbody.appendChild(tr);
    });
}

function changeScheduleMonth(delta) {
    scheduleDate.setMonth(scheduleDate.getMonth() + delta);
    loadSchedulesForMonth();
}

async function loadSchedulesForMonth() {
    const year = scheduleDate.getFullYear();
    const month = scheduleDate.getMonth();
    try {
        scheduleData = await loadSchedules(month, year);
    } catch (e) {
        showToast('警告', '排班数据加载失败', 'warning');
    }
    renderScheduleTable();
}

async function updateSchedule(personId, date, shiftId) {
    if (shiftId === '') return;
    try {
        if (shiftId === 'remove') {
            // Try supabase.js wrapper first, then direct fallback
            try { await deleteSchedule(personId, date); } catch (e) { console.warn('deleteSchedule wrapper failed:', e); }
            // Direct fallback deletion from schedules table
            try {
                await window.supabase.from('schedules').delete()
                    .eq('person_id', personId)
                    .eq('date', date);
            } catch (e) { console.warn('direct schedules delete failed:', e); }
            // Also delete any existing tasks for this person+date
            try {
                await window.supabase.from('sop_tasks').delete()
                    .eq('person_id', personId)
                    .eq('date', date);
            } catch (e) { console.warn('direct tasks delete failed:', e); }
            scheduleData = scheduleData.filter(s => !(s.person_id === personId && s.date === date));
            showToast('已清除', '该日排班及关联任务已清除');
        } else {
            const schedule = { person_id: personId, date: date, shift_id: parseInt(shiftId) };
            const saved = await saveSchedule(schedule);
            if (saved) {
                const idx = scheduleData.findIndex(s => s.person_id === personId && s.date === date);
                if (idx > -1) { scheduleData[idx] = saved; } else { scheduleData.push(saved); }
                // Delete old tasks for this person+date to avoid duplicates when shift changes
                try {
                    await window.supabase.from('sop_tasks').delete()
                        .eq('person_id', personId)
                        .eq('date', date);
                } catch (e) { console.warn('direct tasks delete failed:', e); }
                // Regenerate tasks for this date if function available
                if (typeof generateDailyTasks === 'function') {
                    try { await generateDailyTasks(date, true); } catch (e) { console.warn('generateDailyTasks failed:', e); }
                }
                const shift = shiftData.find(s => s.id === parseInt(shiftId));
                showToast('排班成功', `已安排 ${shift?.name || ''}，请前往任务日历查看生成的任务`);
            } else {
                showToast('排班失败', '保存到数据库失败', 'error');
            }
        }
    } catch (e) {
        console.error('updateSchedule error:', e);
        showToast('操作失败', '数据库连接异常', 'error');
    }
    renderScheduleTable();
}

function openModal(modalId, contentId) {
    const modal = document.getElementById(modalId);
    const content = document.getElementById(contentId);
    modal.classList.remove('hidden');
    setTimeout(() => {
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    }, 10);
}
</script>
